<!DOCTYPE html>
<html lang="pt-BR" style="background-color: burlywood">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galinhas</title>
</head>
<body style="
        text-align: center; 
        background-color: #fff; 
        height: 300px; 
        margin: 50px; 
        padding: 50px; 
        border-radius: 10px;
        font-size: 1.5em;
        color: #DDB786;
        opacity: .8;">
    <head>
        <h1>Vetores JavaScript</h1>
        <hr style="width: 50%; border-color: red;">
    </head>
    <p id="demonstracao"></p>
    <script>
        const galinhas = [
            "Dalvinha",
            "Maria Rosa",
            "Merilyn",
            "Teresa",
            "Flávia",
            "Alvinha"
        ]
        document.getElementById("demonstracao").textContent=" Galinhas: " + galinhas
        // tentando criar um parágrafo
        const paragrafo = document.createElement("p");
        paragrafo.innerHTML = galinhas.length +" galinhas";
        document.body.appendChild(paragrafo);
        // alterando o css do parágrafo criado dinamicamente a partir do JavaScript
        paragrafo.style="color: red; font-size: 2em;";  
    </script>    
</body>
</html>
