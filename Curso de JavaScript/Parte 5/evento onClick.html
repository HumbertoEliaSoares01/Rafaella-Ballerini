<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>evento onClick</title>
  <style>
    html{ text-align: center; }
    h1{
       border-bottom: 1px solid #000;
       width: 500px; margin: auto; padding: 15px;
    }
  </style>
</head>
<body>
    <h1 id="tituloMaior">Eventos DOM HTML</h1>
    <h2 id="tituloMenor">O evento onclick</h2>
    <p>Evento "onclick" chama uma função quando o elemento é clicado.</p>
    <p>Clique para acionar uma função que exibirá "Olá Mundo".:</p>
    <button onclick="myFunction()">Click me</button>
    <p id="demo"></p>
    <script>
    function myFunction() {
    document.getElementById("demo").innerHTML = "Olá, mundo!";
    }
    </script>
    <img src="onClick.png" alt="">
</body>
</html>
